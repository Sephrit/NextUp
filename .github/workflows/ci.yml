name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  desktop:
    name: Desktop checks (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: cargo check --manifest-path src-tauri/Cargo.toml

  repository:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: chmod +x scripts/scan-secrets.sh && ./scripts/scan-secrets.sh
      - run: node Tests/mcp-smoke.mjs

  legacy-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: swift test
