name: Build desktop installers

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macOS-Apple-Silicon
            rustTarget: aarch64-apple-darwin
            tauriArgs: --target aarch64-apple-darwin
          - os: macos-14
            label: macOS-Intel
            rustTarget: x86_64-apple-darwin
            tauriArgs: --target x86_64-apple-darwin
          - os: windows-latest
            label: Windows
            rustTarget: ''
            tauriArgs: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Add macOS Rust target
        if: ${{ matrix.rustTarget != '' }}
        run: rustup target add ${{ matrix.rustTarget }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
      - run: npm ci
        working-directory: desktop
      - name: Build friend-test installer
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: npm run desktop:build -- ${{ matrix.tauriArgs }}
        working-directory: desktop
      - name: Upload friend-test artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: Next-Up-${{ matrix.label }}-${{ github.sha }}
          path: desktop/src-tauri/target/release/bundle/**
          if-no-files-found: error
      - name: Build and attach tagged release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          args: ${{ matrix.tauriArgs }}
          tagName: ${{ github.ref_name }}
          releaseName: Next Up ${{ github.ref_name }}
          releaseBody: See CHANGELOG.md. The macOS beta is ad-hoc signed but not notarized, and the Windows beta is unsigned; review the platform testing guide before installing.
          releaseDraft: false
          prerelease: true
